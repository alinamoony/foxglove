<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;450;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6EDE7;
    --surface:#FBF5F1;
    --surface-2:#F1E5DD;
    --ink:#2A2521;
    --ink-soft:#6E635B;
    --ink-faint:#A99C92;
    --line:#E7D9D0;
    --line-soft:#EFE4DC;
    --accent:#BF513B;
    --accent-soft:#D98C76;
    --gold:#B0823A;
    --good:#7C8A63;
    --serif:'Fraunces',Georgia,'Times New Roman',serif;
    --sans:'Inter',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    font-size:14px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .app{display:flex;min-height:100vh}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:248px;flex-shrink:0;
    border-right:1px solid var(--line);
    padding:22px 18px;
    display:flex;flex-direction:column;gap:18px;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{padding:0 4px;display:flex;align-items:flex-start;gap:10px}
  .brand h1{font-family:var(--serif);font-size:20px;font-weight:500;letter-spacing:.01em}
  .brand .sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-top:2px}
  .sidemenu{display:flex;flex-direction:column;gap:18px;flex:1;min-height:0}
  .navtoggle{display:none;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:8px;width:38px;height:38px;font-size:17px;cursor:pointer;flex-shrink:0}

  /* character card */
  .char{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:14px;display:flex;flex-direction:column;gap:11px;
  }
  .char-top{display:flex;align-items:center;gap:11px}
  .avatar{
    width:42px;height:42px;border-radius:11px;flex-shrink:0;
    background:var(--surface-2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;
    transition:transform .15s;
  }
  .avatar:hover{transform:scale(1.05)}
  .char-id{min-width:0;flex:1}
  .char-name{font-family:var(--serif);font-size:15.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text}
  .char-lvl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-top:1px}
  .xpwrap{display:flex;flex-direction:column;gap:4px}
  .xpbar{height:5px;background:var(--surface-2);border-radius:99px;overflow:hidden}
  .xpfill{height:100%;background:var(--accent);border-radius:99px;transition:width .45s cubic-bezier(.2,.7,.2,1)}
  .xpmeta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);letter-spacing:.04em}
  .coins{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;color:var(--gold);font-weight:500}
  .hpbar{height:5px;background:var(--surface-2);border-radius:99px;overflow:hidden}
  .hpfill{height:100%;background:#BC4A57;border-radius:99px;transition:width .45s cubic-bezier(.2,.7,.2,1)}
  .hpmeta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);letter-spacing:.04em}
  /* boss cards */
  .boss-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .boss-card.defeated{opacity:.6}
  .boss-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
  .boss-emoji{width:40px;height:40px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
  .boss-name{font-family:var(--serif);font-size:18px;font-weight:500;line-height:1.15}
  .boss-habit{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .boss-hpwrap{margin:12px 0}
  .boss-hp{height:9px;background:var(--surface-2);border-radius:99px;overflow:hidden}
  .boss-hpfill{height:100%;background:linear-gradient(90deg,#5A4A42,#7A6457);border-radius:99px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .boss-hpmeta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:6px;letter-spacing:.04em}
  .boss-actions{display:flex;gap:9px;margin-top:13px}
  .btn-resist{flex:1;border:1px solid var(--good);background:rgba(124,138,99,.1);color:var(--good);border-radius:9px;padding:10px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:.12s}
  .btn-resist:hover{background:var(--good);color:#fff}
  .btn-slip{border:1px solid var(--line);background:none;color:var(--ink-soft);border-radius:9px;padding:10px 14px;font-family:var(--sans);font-size:13px;cursor:pointer;transition:.12s}
  .btn-slip:hover{border-color:#BC4A57;color:#BC4A57}
  .boss-acted{display:flex;align-items:center;justify-content:space-between;margin-top:13px;gap:10px;font-size:13px}
  .boss-acted .undo{border:none;background:none;color:var(--ink-faint);font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
  .boss-acted .undo:hover{color:var(--accent)}
  .trophy{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
  /* digests */
  .dg-add-row{display:flex;align-items:center;gap:10px;margin-bottom:20px}
  .dg-month{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:7px 10px;font-family:var(--mono);font-size:12px;color:var(--ink);outline:none}
  .dg-month:focus{border-color:var(--accent)}
  .dg-addbtn{margin:0}
  .dg-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:16px;overflow:hidden}
  .dg-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;background:none;border:none;cursor:pointer;padding:18px 24px;text-align:left;font-family:var(--sans)}
  .dg-title{font-family:var(--serif);font-size:24px;font-weight:500;letter-spacing:-.01em;color:var(--ink)}
  .dg-chev{font-size:13px;color:var(--ink-faint)}
  .dg-inner{padding:0 24px 24px}
  .dg-inner.hidden{display:none}
  .dg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px 24px}
  .dg-block{min-width:0}
  .dg-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
  .dg-edit{font-size:13.5px;line-height:1.55;color:var(--ink);outline:none;min-height:22px;white-space:pre-wrap;border-radius:5px}
  .dg-edit:empty:before{content:attr(data-ph);color:var(--ink-faint)}
  .dg-edit:focus{box-shadow:0 0 0 2px var(--surface-2)}
  .dg-del{display:block;margin-top:18px;border:none;background:none;color:var(--ink-faint);font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
  .dg-del:hover{color:var(--accent)}
  .chart-seg{display:inline-flex;gap:5px}
  .chart-seg button{flex:0 0 auto;padding:4px 11px;font-size:11px;font-family:var(--mono);letter-spacing:.04em}
  .rc-scan{display:flex;gap:9px;align-items:center;margin-bottom:22px;flex-wrap:wrap}
  .rc-scanbtn{margin:0}
  .rc-blank{margin:0}
  .rc-filter{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:16px}
  .fridge-match{padding:9px 0;border-top:1px solid var(--line-soft);cursor:pointer}
  .fridge-match:hover strong{color:var(--accent)}
  .fridge-suggest{white-space:pre-wrap;font-size:13px;line-height:1.6;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:12px}
  .mb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-top:4px}
  .mb-tile{position:relative;aspect-ratio:1;border-radius:9px;overflow:hidden;border:1px solid var(--line)}
  .mb-tile img{width:100%;height:100%;object-fit:cover;display:block}
  .mb-tile .mb-del{position:absolute;top:5px;right:5px;border:none;background:rgba(42,37,33,.62);color:#fff;border-radius:6px;width:22px;height:22px;cursor:pointer;font-size:11px;opacity:0;transition:.12s}
  .mb-tile:hover .mb-del{opacity:1}
  .mb-add{aspect-ratio:1;border:1px dashed var(--line);background:none;border-radius:9px;color:var(--ink-faint);font-family:var(--mono);font-size:11px;letter-spacing:.04em;cursor:pointer;transition:.12s}
  .mb-add:hover{border-color:var(--accent);color:var(--accent)}
  .coins .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 2px rgba(176,130,58,.18)}

  /* nav */
  nav{display:flex;flex-direction:column;gap:1px}
  .nav-btn{
    display:flex;align-items:center;gap:10px;
    padding:7px 9px;border-radius:8px;border:none;background:none;
    font-family:var(--sans);font-size:13.5px;color:var(--ink-soft);
    cursor:pointer;text-align:left;width:100%;transition:background .12s,color .12s;
  }
  .nav-btn:hover{background:var(--surface)}
  .nav-btn.active{background:var(--surface);color:var(--ink);font-weight:500}
  .nav-btn .ico{width:16px;text-align:center;font-size:14px;opacity:.85}
  .nav-sep{height:1px;background:var(--line-soft);margin:7px 4px}

  .search{
    display:flex;align-items:center;gap:8px;background:var(--surface);
    border:1px solid var(--line);border-radius:8px;padding:7px 10px;
  }
  .search input{border:none;background:none;outline:none;font-family:var(--sans);font-size:13px;color:var(--ink);width:100%}
  .search input::placeholder{color:var(--ink-faint)}

  .capture-btn{
    margin-top:auto;display:flex;align-items:center;justify-content:center;gap:8px;
    background:var(--ink);color:var(--bg);border:none;border-radius:9px;
    padding:10px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;
    transition:opacity .15s;
  }
  .capture-btn:hover{opacity:.9}

  /* ---------- Main ---------- */
  .main{flex:1;min-width:0;padding:34px 46px 80px;max-width:1180px}
  .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}
  .page-head{margin-bottom:30px}
  .page-head .eyebrow{margin-bottom:7px}
  .page-title{font-family:var(--serif);font-size:40px;font-weight:500;line-height:1.05;letter-spacing:-.01em}
  .page-title.sm{font-size:30px}

  .cols{display:grid;grid-template-columns:1fr 340px;gap:46px;align-items:start}
  @media(max-width:1080px){.cols{grid-template-columns:1fr}}
  .colR > * + *{margin-top:20px}
  .colR > .section{margin-bottom:0}

  .section{margin-bottom:30px}
  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;padding-bottom:7px;border-bottom:1px solid var(--line-soft)}
  .section-head .right{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--ink-faint)}

  /* rows */
  .row{display:flex;align-items:flex-start;gap:11px;padding:9px 0}
  .row + .row{border-top:1px solid var(--line-soft)}
  .check{
    width:17px;height:17px;border:1.5px solid var(--ink-faint);border-radius:5px;flex-shrink:0;margin-top:1px;
    cursor:pointer;background:none;display:flex;align-items:center;justify-content:center;transition:.12s;
  }
  .check:hover{border-color:var(--accent)}
  .check.done{background:var(--ink);border-color:var(--ink)}
  .check.done::after{content:"✓";color:var(--bg);font-size:11px;line-height:1}
  .row-body{flex:1;min-width:0}
  .row-title{font-size:14px;color:var(--ink)}
  .row-title.done{color:var(--ink-faint);text-decoration:line-through}
  .row-meta{display:flex;align-items:center;gap:9px;margin-top:3px;flex-wrap:wrap}
  .tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);background:var(--surface-2);padding:2px 7px;border-radius:5px}
  .tag.skill{color:var(--good);background:rgba(124,138,99,.12)}
  .streak{font-family:var(--mono);font-size:10px;color:var(--accent)}
  .due{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);font-weight:500}
  .nextdue{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;color:var(--ink-faint)}
  .x-del{margin-left:auto;border:none;background:none;color:var(--ink-faint);cursor:pointer;font-size:14px;opacity:0;transition:.12s;padding:0 4px}
  .row:hover .x-del,.qcard:hover .x-del,.lib-item:hover .x-del{opacity:1}
  .libtitle{font-size:14px;color:var(--ink);outline:none;cursor:text;border-radius:4px}
  .libtitle.done{color:var(--ink-faint)}
  .libtitle:focus{box-shadow:0 0 0 2px var(--surface-2)}
  .lib-act{border:1px solid var(--line);background:none;color:var(--ink-soft);border-radius:6px;font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;padding:4px 7px;cursor:pointer;flex-shrink:0;white-space:nowrap;transition:.12s}
  .lib-act:hover{border-color:var(--accent);color:var(--accent)}
  .libdate{display:flex;align-items:center;gap:6px;margin-top:3px}
  .libdate span{font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--ink-faint)}
  .libdate input{font-family:var(--mono);font-size:9.5px;color:var(--ink-soft);border:1px solid transparent;background:none;border-radius:5px;padding:1px 3px;cursor:pointer}
  .libdate input:hover{border-color:var(--line)}
  .libdate input:focus{outline:none;border-color:var(--accent)}
  .x-del:hover{color:var(--accent)}

  .group-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:18px 0 4px}
  .group-label:first-child{margin-top:0}

  /* cards / side panel */
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px}
  .panel + .panel{margin-top:18px}
  .panel-title{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px}

  /* skills */
  .skill-row{display:flex;flex-direction:column;gap:5px;padding:8px 0}
  .skill-row + .skill-row{border-top:1px solid var(--line-soft)}
  .skill-head{display:flex;justify-content:space-between;align-items:baseline}
  .skill-name{font-size:13px;font-weight:450}
  .skill-lvl{font-family:var(--mono);font-size:10px;color:var(--ink-faint)}
  .skill-bar{height:4px;background:var(--surface-2);border-radius:99px;overflow:hidden}
  .skill-fill{height:100%;background:var(--good);border-radius:99px;transition:width .45s}

  /* quests */
  .qcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:14px}
  .qcard-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
  .qname{font-family:var(--serif);font-size:17px;font-weight:500;flex:1;cursor:text;outline:none}
  .qprog-wrap{margin:11px 0 13px}
  .qprog{height:6px;background:var(--surface-2);border-radius:99px;overflow:hidden}
  .qprog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s}
  .qprog-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);margin-top:5px;letter-spacing:.04em}
  .qtodos{display:flex;flex-direction:column;gap:1px}
  .qtodo{display:flex;align-items:center;gap:9px;padding:6px 0}
  .qtodo input.txt{border:none;background:none;outline:none;font-family:var(--sans);font-size:13.5px;color:var(--ink);flex:1}
  .qtodo input.txt.done{color:var(--ink-faint);text-decoration:line-through}
  .skillpick{border:1px solid var(--line);background:var(--surface-2);color:var(--good);border-radius:6px;font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;padding:3px 4px;outline:none;cursor:pointer;flex-shrink:0}
  .skillpick:focus{border-color:var(--accent)}
  .skillwrap{display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
  .skillq{border:1px solid var(--line);background:var(--surface);color:var(--ink-faint);border-radius:50%;width:16px;height:16px;font-size:9px;line-height:1;cursor:pointer;padding:0;flex-shrink:0}
  .skillq:hover{border-color:var(--accent);color:var(--accent)}
  /* skills tab */
  .skl-head{display:flex;align-items:baseline;justify-content:space-between}
  .skl-name{font-family:var(--serif);font-size:19px;font-weight:500}
  .skl-area{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-top:1px solid var(--line-soft)}
  .skl-area-name{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--ink);font-weight:500;min-width:120px;flex-shrink:0;outline:none;border-radius:4px}
  .skl-area-desc{font-size:13px;color:var(--ink-soft);flex:1;outline:none;border-radius:4px;min-height:18px}
  .skl-area-desc:empty:before{content:attr(data-ph);color:var(--ink-faint)}
  .skl-area-name:focus,.skl-area-desc:focus{box-shadow:0 0 0 2px var(--surface-2)}
  /* skill guide modal */
  .sg-list{max-height:60vh;overflow-y:auto}
  .sg-skill{margin-bottom:16px}
  .sg-skill-name{font-family:var(--serif);font-size:17px;font-weight:500;margin-bottom:6px}
  .sg-area{font-size:12.5px;line-height:1.5;padding:2px 0}
  .sg-area-name{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:var(--ink);font-weight:500}
  .sg-area-desc{color:var(--ink-soft)}
  .rv-more{border:none;background:none;color:var(--ink-faint);font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;padding:8px 0 2px}
  .rv-more:hover{color:var(--accent)}
  .prio{border:1px solid var(--line);border-radius:6px;font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;padding:3px 4px;outline:none;cursor:pointer;flex-shrink:0;background:var(--surface-2)}
  .prio.high{color:#BC4A57;border-color:#BC4A57}
  .prio.medium{color:var(--gold)}
  .prio.low{color:var(--ink-faint)}
  .prio:focus{border-color:var(--accent)}
  .star{border:none;background:none;cursor:pointer;font-size:15px;line-height:1;color:var(--ink-faint);flex-shrink:0;padding:0 2px;transition:color .12s,transform .12s}
  .star:hover{transform:scale(1.15)}
  .star.on{color:var(--gold)}
  .qtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .add-inline{display:flex;align-items:center;gap:8px;margin-top:8px}
  .add-inline input{border:none;border-bottom:1px solid var(--line);background:none;outline:none;font-family:var(--sans);font-size:13px;padding:4px 0;flex:1;color:var(--ink)}
  .add-inline input:focus{border-color:var(--accent)}

  /* market */
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .mcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px;display:flex;flex-direction:column;gap:12px}
  .mcard .mname{font-size:14.5px;font-weight:500}
  .mcard .mfoot{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
  .price{font-family:var(--mono);font-size:13px;color:var(--gold);font-weight:500;display:flex;align-items:center;gap:6px}
  .price .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
  .buy{border:1px solid var(--ink);background:none;color:var(--ink);border-radius:7px;padding:6px 13px;font-family:var(--sans);font-size:12.5px;font-weight:500;cursor:pointer;transition:.12s}
  .buy:hover:not(:disabled){background:var(--ink);color:var(--bg)}
  .buy:disabled{opacity:.35;cursor:not-allowed}

  /* generic add button */

const DOWN_COIN_PENALTY=10; // coins lost when knocked out (HP hits 0)
const RESIST_EXP=5, RESIST_COINS=2;
const BOSS_WIN_EXP=50, BOSS_WIN_COINS=25;

function clampHp(){ const c=state.character; const m=c.maxHp||100; c.hp=Math.max(0,Math.min(m, c.hp==null?m:c.hp)); }
function bossResist(id){
  const b=state.bosses.find(x=>x.id===id); if(!b||b.defeated) return;
  if(b.acted===today()) return;
  b.hp=Math.max(0,b.hp-RESIST_DMG);
  state.character.hp=(state.character.hp==null?state.character.maxHp:state.character.hp)+RESIST_HEAL; clampHp();
  if(b.earnedOn!==today()){ gain({exp:RESIST_EXP,coins:RESIST_COINS,skill:b.skill}); logEvent('Resisted: '+b.name,{exp:RESIST_EXP,coins:RESIST_COINS,skill:b.skill,kind:'resist'}); b.earnedOn=today(); }
  b._prevSlipStreak=b.slipStreak||0;   // for undo
  b.slipStreak=0;                       // resisting breaks the slip streak
  b.acted=today(); b.actedType='resist';
  if(b.hp<=0){ b.defeated=true; b.defeatedOn=today(); gain({exp:BOSS_WIN_EXP,coins:BOSS_WIN_COINS}); logEvent('Defeated: '+b.name,{exp:BOSS_WIN_EXP,coins:BOSS_WIN_COINS,kind:'bossWin'}); toast('Boss defeated! '+b.name,'+trophy'); }
  save();
}
function bossSlip(id){
  const b=state.bosses.find(x=>x.id===id); if(!b||b.defeated) return;
  if(b.acted===today()) return;
  // consecutive slip days make the habit regain ground
  const streak=(b.lastSlipDay===yesterday()? (b.slipStreak||0)+1 : 1);
  const wantHeal=SLIP_BOSS_HEAL*streak;
  b.lastHeal=Math.min(wantHeal, b.maxHp-b.hp);  // what we actually applied (for undo)
  b.hp=Math.min(b.maxHp, b.hp+wantHeal);
  // remember prior values for undo
  b._prevSlipStreak=b.slipStreak||0; b._prevLastSlipDay=b.lastSlipDay||'';
  b.slipStreak=streak; b.lastSlipDay=today();
  // player takes damage
  const prevHp=state.character.hp==null?state.character.maxHp:state.character.hp;
  state.character.hp=prevHp-SLIP_DMG; clampHp();
  b.lastPenalty=0;
  if(prevHp>0 && state.character.hp<=0){ // knocked out
    b.lastPenalty=Math.min(DOWN_COIN_PENALTY, state.character.coins);
    state.character.coins-=b.lastPenalty;
    toast('Knocked out — lost '+b.lastPenalty+' coins. EXP stays. Rest & regroup.','down');
  } else if(streak>=2){
    toast(b.name+' is regaining ground ('+streak+' slips running)','+'+(b.lastHeal)+' boss HP');
  }
  b.acted=today(); b.actedType='slip';
  save();
}
function bossUndo(id){
  const b=state.bosses.find(x=>x.id===id); if(!b) return;
  if(b.acted!==today()||b.defeated) return;
  if(b.actedType==='resist'){
    b.hp=Math.min(b.maxHp,b.hp+RESIST_DMG);
    state.character.hp=(state.character.hp||0)-RESIST_HEAL; clampHp();
    b.slipStreak=b._prevSlipStreak||0;
  } else if(b.actedType==='slip'){
    state.character.hp=(state.character.hp||0)+SLIP_DMG; clampHp();
    b.hp=Math.max(0,b.hp-(b.lastHeal||0));
    if(b.lastPenalty){ state.character.coins+=b.lastPenalty; b.lastPenalty=0; }
    b.slipStreak=b._prevSlipStreak||0; b.lastSlipDay=b._prevLastSlipDay||'';
  }
  b.acted=''; b.actedType='';   // earnedOn stays, so re-resisting today won't re-award
  save();
}

/* ---------- image upload (downscaled, stored as data URL) ---------- */
function pickImage(cb){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(f) downscaleImage(f,cb); };
  inp.click();
}
function downscaleImage(file, cb){
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=640; let w=img.width, h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      try{ cb(cv.toDataURL('image/jpeg',0.6)); }catch(e){ toast('Could not process that image'); }
    };
    img.onerror=()=>toast('Could not read that image');
    img.src=reader.result;
  };
  reader.onerror=()=>toast('Could not read that file');
  reader.readAsDataURL(file);
}

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function toast(main,tx){
  const t=el(`<div class="toast">${tx?`<span class="tx">${esc(tx)}</span>`:''}<span>${esc(main)}</span></div>`);
  $('#toasts').appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300)},2200);
}

/* ---------- Routine row ---------- */
function routineRow(r,compact){
  const periodic=rfreq(r)!=='daily';
  const done = periodic ? !routineDue(r) : (r.last===today());
  // status text for periodic chores
  let status='';
  if(periodic){
    if(routineDue(r)){
      const d=daysToDue(r);
      status = (d===null) ? '<span class="due">due now</span>' : `<span class="due">overdue ${Math.abs(d)}d</span>`;
    } else {
      status = `<span class="nextdue">next in ${daysToDue(r)}d</span>`;
    }
  }
  const row=el(`<div class="row">
    <button class="check ${done?'done':''}"></button>
    <div class="row-body">
      <div class="row-title ${done&&!periodic?'done':''}" ${compact?'':'contenteditable="true" spellcheck="false"'}>${esc(r.name)}</div>
      <div class="row-meta">
        <span class="tag skill">${esc(r.skill)}</span>
        ${periodic?`<span class="tag" style="font-size:9px">${FREQ[rfreq(r)].label}</span>`:''}
        ${!periodic && r.streak>0?`<span class="streak">🔥 ${r.streak}</span>`:''}
        ${status}
      </div>
    </div>
    ${compact?'':'<button class="x-del">✕</button>'}
  </div>`);
  row.querySelector('.check').onclick=()=>toggleRoutine(r.id);
  if(!compact){
    const titleEl=row.querySelector('.row-title');
    titleEl.style.outline='none';
    titleEl.onblur=()=>{ r.name=titleEl.textContent.trim()||r.name; save(); };
    titleEl.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();titleEl.blur();} };
    row.querySelector('.x-del').onclick=()=>{ state.routines=state.routines.filter(x=>x.id!==r.id); save(); };
  }
  return row;
}
function toggleRoutine(id){
  const r=state.routines.find(x=>x.id===id);
  if(!r) return;
  const t=today();
  if(rfreq(r)!=='daily'){           // periodic chore
    if(!routineDue(r)){             // currently satisfied -> undo, make it due again
      r.last=r.prevLast||'';
      save();
    } else {                        // due -> complete it
      const f=FREQ[rfreq(r)];
      r.prevLast=r.last;
      r.last=t;
      if(r.earnedOn!==t){ gain({exp:f.exp,coins:f.coins,skill:r.skill}); logEvent(r.name,{exp:f.exp,coins:f.coins,skill:r.skill,kind:'routine'}); r.earnedOn=t; }
      save();
    }
    return;
  }
  // daily routine
  if(r.last===t){ // uncheck — silent correction, never subtracts EXP
    r.last='';
    r.streak=Math.max(0,r.streak-1);
    save();
  } else {        // mark done
    if(r.earnedOn===t){           // already paid out today (re-checking after an undo)
      r.last=t; r.streak=r.streak+1; save();
    } else {
      r.streak = (r.last===yesterday()) ? r.streak+1 : 1;
      r.last=t; r.earnedOn=t;
      gain({exp:5,coins:2,skill:r.skill});
      logEvent(r.name,{exp:5,coins:2,skill:r.skill,kind:'routine'});
      save();
    }
  }
}

function viewToday(){
  const d=new Date();
  const dateStr=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const dailyRoutines=state.routines.filter(r=>rfreq(r)==='daily');
  const doneCount=dailyRoutines.filter(r=>r.last===today()).length;

  const wrap=el(`<div>
    <div class="page-head">
      <div class="eyebrow">Today</div>
      <div class="page-title">${dateStr}</div>
    </div>
    <div class="cols">
      <div class="colL"></div>
      <div class="colR"></div>
    </div>
  </div>`);
  const L=wrap.querySelector('.colL'), R=wrap.querySelector('.colR');

  /* TOP 3 — your starred tasks */
  const topTasks=state.tasks.filter(t=>t.top).slice(0,3);
  const top=el(`<div class="section">
    <div class="section-head"><span class="eyebrow">Top 3 for today</span></div>
  </div>`);
  topTasks.forEach(t=>top.appendChild(taskRow(t)));
  // open spots to fill up to 3
  for(let i=topTasks.length;i<3;i++){
    const row=el(`<div class="row">
      <button class="check"></button>
      <div class="row-body"><input style="border:none;background:none;outline:none;font-size:14px;width:100%;color:var(--ink)" placeholder="(open spot — type a task)"></div>
    </div>`);
    const inp=row.querySelector('input');
    const add=()=>{ if(inp.value.trim()){ state.tasks.push({id:uid(),name:inp.value.trim(),skill:'Compass',done:false,top:true}); save(); } };
    inp.onkeydown=e=>{ if(e.key==='Enter') add(); };
    inp.onblur=add;
    top.appendChild(row);
  }
  top.appendChild(el('<div class="hint">Star any task to feature it here · max 3.</div>'));
  L.appendChild(top);

  /* ROUTINES today */
  const rt=el(`<div class="section">
    <div class="section-head"><span class="eyebrow">Routines today</span><span class="right">${doneCount}/${dailyRoutines.length}</span></div>
  </div>`);
  ['morning','afternoon','evening'].forEach(slot=>{
    const items=dailyRoutines.filter(r=>r.time===slot);
    if(!items.length) return;
    rt.appendChild(el(`<div class="group-label">${slot}</div>`));
    items.forEach(r=>rt.appendChild(routineRow(r,true)));
  });
  if(!dailyRoutines.length) rt.appendChild(el('<div class="empty">No daily routines yet — add some in the Routines tab.</div>'));
  L.appendChild(rt);

  /* UPKEEP DUE — periodic chores that need doing */
  const dueChores=state.routines.filter(r=>PERIODIC.includes(rfreq(r)) && routineDue(r));
  if(dueChores.length){
    const up=el(`<div class="section"><div class="section-head"><span class="eyebrow" style="color:var(--accent)">Upkeep due</span><span class="right">${dueChores.length}</span></div></div>`);
    dueChores.forEach(r=>up.appendChild(routineRow(r,true)));
    L.appendChild(up);
  }

  /* ACTIVE QUESTS */
  const qs=el(`<div class="section"><div class="section-head"><span class="eyebrow">Active quests</span></div></div>`);
  if(!state.quests.length) qs.appendChild(el('<div class="empty">No quests yet.</div>'));
  state.quests.forEach(q=>{
    const total=q.todos.length, done=q.todos.filter(t=>t.done).length;
    const pct=total?Math.round(done/total*100):0;
    const card=el(`<div class="qcard">
      <div class="qcard-head"><div class="qname" style="font-size:15px;cursor:default">${esc(q.name)}</div></div>
      <div class="qprog-wrap"><div class="qprog"><div class="qprog-fill" style="width:${pct}%"></div></div>
        <div class="qprog-meta"><span>${q.tags.map(esc).join(' · ')||''}</span><span>${done}/${total}</span></div></div>
    </div>`);
    qs.appendChild(card);
  });
  L.appendChild(qs);

  /* OTHER TASKS — everything not starred into Top 3 (lower priority, below quests) */
  const otherTasks=state.tasks.filter(t=>!t.top && !t.done).sort((a,b)=>PRIO_RANK[a.priority||'medium']-PRIO_RANK[b.priority||'medium']);
  if(otherTasks.length){
    const ot=el(`<div class="section"><div class="section-head"><span class="eyebrow">Other tasks</span><span class="right">${otherTasks.length}</span></div></div>`);
    otherTasks.forEach(t=>ot.appendChild(taskRow(t)));
    L.appendChild(ot);
  }

  /* SLIPPING — quests that have gone quiet */
  const slipping=state.quests.filter(questSlipping);
  const slip=el(`<div class="panel"><div class="panel-title">Slipping</div></div>`);
  if(!slipping.length){
    slip.appendChild(el('<div class="empty" style="padding:2px 0;font-size:12.5px">Nothing slipping right now. Quests that go quiet — no progress in a while — surface here.</div>'));
  } else {
    slipping.forEach(q=>{
      const d=daysSince(q.lastTouched||'');
      const row=el(`<div class="lib-item"><div style="flex:1;min-width:0">${esc(q.name)}</div><span class="due">quiet ${isFinite(d)?d+'d':'—'}</span></div>`);
      slip.appendChild(row);
    });
  }
  R.appendChild(slip);

  /* ACTIVE FIGHT panel */
  const activeBosses=state.bosses.filter(b=>!b.defeated);
  if(activeBosses.length){
    const bp=el(`<div class="section"><div class="section-head"><span class="eyebrow">Active fight${activeBosses.length>1?'s':''}</span></div></div>`);
    activeBosses.slice(0,2).forEach(b=>bp.appendChild(bossCard(b,true)));
    R.appendChild(bp);
  }

  /* SKILLS panel */
  const sk=el(`<div class="panel"><div class="panel-title">Skills</div></div>`);
  SKILLS.forEach(s=>{
    const sd=state.skills[s];const need=expNeeded(sd.level);const pct=Math.round(sd.exp/need*100);
    sk.appendChild(el(`<div class="skill-row">
      <div class="skill-head"><span class="skill-name">${s}</span><span class="skill-lvl">Lv ${sd.level} · ${sd.exp}/${need}</span></div>
      <div class="skill-bar"><div class="skill-fill" style="width:${pct}%"></div></div>
    </div>`));
  });
  R.appendChild(sk);

  /* READING / WATCHING / PLAYING */
  const lib=el(`<div class="panel"><div class="panel-title">Currently</div></div>`);
  const cur=[...state.library.reading,...state.library.watching,...(state.library.playing||[])].filter(x=>x.status!=='done');
  if(!cur.length) lib.appendChild(el('<div class="empty">Nothing set as current.</div>'));
  cur.forEach(x=>lib.appendChild(el(`<div class="lib-item"><div class="lib-cover">${x.cover||'📖'}</div><div>${esc(x.title)}</div></div>`)));
  R.appendChild(lib);

  /* NEEDS REVIEW — random bookmarks resurface daily */
  const bookmarks=state.captures.filter(c=>c.type==='bookmark');
  const valid = reviewState.ids.length && reviewState.ids.every(id=>bookmarks.some(b=>b.id===id));
  if(reviewState.day!==today() || !valid || reviewState.ids.length < Math.min(3,bookmarks.length)){
    const shuffled=[...bookmarks].sort(()=>Math.random()-0.5);
    reviewState={day:today(), ids:shuffled.slice(0,3).map(b=>b.id)};
  }
  const reviewItems=reviewState.ids.map(id=>bookmarks.find(b=>b.id===id)).filter(Boolean);
  const rv=el(`<div class="panel"><div class="panel-title">Needs review</div></div>`);
  if(!bookmarks.length){
    rv.appendChild(el('<div class="empty" style="padding:2px 0;font-size:12.5px">Bookmarks you capture will resurface here so you actually revisit them.</div>'));
  } else {
    reviewItems.forEach(b=>{
      const t=(b.text||'').trim();
      const isUrl=/^https?:\/\/\S+$/.test(t);
      const inner=isUrl?`<a href="${esc(t)}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;word-break:break-all">${esc(t)}</a>`:esc(b.text);
      rv.appendChild(el(`<div class="lib-item" style="align-items:flex-start"><div style="flex:1;min-width:0;font-size:13px;line-height:1.45">${inner}</div></div>`));
    });
    const more=el('<button class="rv-more">show more →</button>');
    more.onclick=()=>{ captureType='bookmark'; activeTab='capture'; renderAll(); };
    rv.appendChild(more);
  }
  R.appendChild(rv);

  return wrap;
}

function questCard(q){
  const total=q.todos.length, done=q.todos.filter(t=>t.done).length;
  const pct=total?Math.round(done/total*100):0;
  const card=el(`<div class="qcard">
    <div class="qcard-head">
      <div class="qname" contenteditable="true" spellcheck="false">${esc(q.name)}</div>
      <button class="x-del">✕</button>
    </div>
    <div class="qprog-wrap"><div class="qprog"><div class="qprog-fill" style="width:${pct}%"></div></div>
      <div class="qprog-meta"><span>progress</span><span>${done}/${total} · ${pct}%</span></div></div>
    <div class="qtodos"></div>
    <div class="add-inline"><span style="color:var(--ink-faint)">+</span><input placeholder="Add a step…"></div>
    <div class="qtags"></div>
    <div class="add-inline" style="margin-top:4px"><span class="tag" style="background:none;padding:0;color:var(--ink-faint)">TAGS</span><input class="taginput" placeholder="add tag, Enter" style="font-size:12px"></div>
  </div>`);
  // name edit
  const nameEl=card.querySelector('.qname');
  nameEl.onblur=()=>{ q.name=nameEl.textContent.trim()||'Untitled'; save(); };
  nameEl.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();nameEl.blur()}};
  // delete
  card.querySelector('.x-del').onclick=()=>{ if(confirm('Delete this quest?')){state.quests=state.quests.filter(x=>x.id!==q.id);save();} };
  // todos
  const tw=card.querySelector('.qtodos');
  q.todos.forEach(t=>{
    if(!t.skill) t.skill='Compass';
    const row=el(`<div class="qtodo"><button class="check ${t.done?'done':''}"></button><input class="txt ${t.done?'done':''}" value="${esc(t.text)}"></div>`);
    row.querySelector('.check').onclick=()=>toggleTodo(q,t);
    const inp=row.querySelector('.txt');
    inp.onchange=()=>{t.text=inp.value;save()};
    row.appendChild(skillSelect(t.skill,v=>{t.skill=v;save()}));
    const del=el('<button class="x-del">✕</button>');
    del.onclick=()=>{q.todos=q.todos.filter(x=>x.id!==t.id);save()};

    tw.appendChild(row);
  });
  // add todo
  const addInp=card.querySelector('.qtodos + .add-inline input');
  addInp.onkeydown=e=>{ if(e.key==='Enter'&&addInp.value.trim()){ q.todos.push({id:uid(),text:addInp.value.trim(),skill:'Compass',done:false}); q.lastTouched=today(); save(); } };
  // tags
  const tagWrap=card.querySelector('.qtags');

    const t=el(`<span class="tag">${esc(tg)} <span style="cursor:pointer;color:var(--ink-faint)">✕</span></span>`);
    t.querySelector('span').onclick=()=>{q.tags.splice(i,1);save()};
    tagWrap.appendChild(t);
  });
  const tagInp=card.querySelector('.taginput');
  tagInp.onkeydown=e=>{ if(e.key==='Enter'&&tagInp.value.trim()){ q.tags.push(tagInp.value.trim());save(); } };
  return card;
}
function toggleTodo(q,t){
  t.done=!t.done;
  if(t.done){
    q.lastTouched=today();   // progress = the quest is alive
    if(!t.earned){ gain({exp:3,skill:t.skill}); logEvent(t.text+'  ·  '+q.name,{exp:3,skill:t.skill,kind:'quest'}); t.earned=true; }
    if(q.todos.length && q.todos.every(x=>x.done) && !q.earnedComplete){
      gain({exp:25,coins:10}); logEvent('Quest complete: '+q.name,{exp:25,coins:10,kind:'questDone'}); q.earnedComplete=true; toast('Quest complete!','+bonus');
    }
  }
  // un-checking is a silent correction — EXP already earned stays earned
  save();
}

function taskRow(t){
  if(!t.skill) t.skill='Compass';

    t.top=true;

/* ---------- charts ---------- */
function shiftDay(ds, delta){ const d=new Date(ds+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+delta); return d.toISOString().slice(0,10); }
function expByDay(numDays){
  const base=today(); const out=[];
  for(let i=numDays-1;i>=0;i--){
    const ds=shiftDay(base,-i);
    const dayLog=(state.log||[]).filter(e=>e.date===ds);
    out.push({
      ds,
      value: dayLog.reduce((a,e)=>a+(e.exp||0),0),
      short: new Date(ds+'T00:00:00Z').toLocaleDateString('en-US',{weekday:'short',timeZone:'UTC'}).slice(0,2),
      day: new Date(ds+'T00:00:00Z').getUTCDate(),
    });
  }
  return out;
}
function barChart(data){
  const W=520,H=150,padX=10,padB=22,padT=12, n=data.length;
  const max=Math.max(1,...data.map(d=>d.value));
  const bw=(W-padX*2)/n;
  let bars='';
  data.forEach((d,i)=>{
    const h=Math.round((d.value/max)*(H-padB-padT));
    const x=padX+i*bw, y=H-padB-h;
    bars+=`<rect x="${(x+bw*0.16).toFixed(1)}" y="${y}" width="${(bw*0.68).toFixed(1)}" height="${Math.max(h,d.value>0?2:0)}" rx="2.5" style="fill:var(--accent)"><title>${d.ds}: +${d.value} EXP</title></rect>`;
    if(n<=10) bars+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-7}" text-anchor="middle" style="fill:var(--ink-faint);font-family:var(--mono);font-size:9px">${d.short}</text>`;
    else if(d.day===1||i===0||i===n-1) bars+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-7}" text-anchor="middle" style="fill:var(--ink-faint);font-family:var(--mono);font-size:8px">${d.day}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible"><line x1="${padX}" y1="${H-padB}" x2="${W-padX}" y2="${H-padB}" style="stroke:var(--line)"/>${bars}</svg>`;
}

/* ---------- fridge ---------- */
function fridgeList(){ return (state.fridge||'').split(/[\n,]/).map(s=>s.trim().toLowerCase()).filter(s=>s.length>=2); }
function matchRecipe(r){
  const lines=(r.ingredients||'').split('\n').map(s=>s.trim()).filter(Boolean);
  if(!lines.length) return null;
  const have=fridgeList();
  let got=0; const missing=[];
  lines.forEach(line=>{
    const low=line.toLowerCase();
    if(have.some(tok=>low.includes(tok))) got++; else missing.push(line);
  });
  return {total:lines.length, got, missing, ratio:got/lines.length};
}
async function suggestFromFridge(){
  const items=fridgeList();
  if(!items.length){ toast('List a few ingredients first'); return; }
  fridgeSuggestLoading=true; fridgeSuggestText=''; renderView();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-6',max_tokens:1000,
      messages:[{role:'user',content:`I have these ingredients on hand: ${items.join(', ')}.\n\nSuggest 3 recipes I could realistically make. For each, give: the recipe name, which of my ingredients it uses, and a short list of what I'd still need to buy. Keep it concise and warm. Plain text only — no markdown headers or asterisks.`}],
      tools:[{type:'web_search_20250305',name:'web_search'}]
    })});
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
    fridgeSuggestText=text||'No ideas came back — try different ingredients.';
  }catch(e){ fridgeSuggestText='Couldn’t reach the recipe helper right now — check your connection and try again.'; }
  fridgeSuggestLoading=false; renderView();
}
function fridgePanel(){
  const card=el(`<div class="dg-card" style="margin-bottom:22px">
    <button class="dg-head"><span class="dg-title" style="font-size:19px">🧊 What's in my fridge</span><span class="dg-chev">${fridgeOpen?'▾':'▸'}</span></button>
    <div class="dg-inner ${fridgeOpen?'':'hidden'}"></div>
  </div>`);
  card.querySelector('.dg-head').onclick=()=>{ fridgeOpen=!fridgeOpen; renderView(); };
  const inner=card.querySelector('.dg-inner');
  const fb=el('<div class="dg-block"><div class="dg-label">Ingredients I have (one per line or comma-separated)</div><div class="dg-edit" contenteditable="true" spellcheck="false" data-ph="eggs, spinach, feta, pasta…" style="min-height:54px"></div></div>');
  const fe=fb.querySelector('.dg-edit'); fe.innerText=state.fridge||'';
  fe.onblur=()=>{ state.fridge=fe.innerText.trim(); persist(); renderView(); };
  inner.appendChild(fb);

  const have=fridgeList();
  if(have.length){
    // match saved recipes
    const matches=state.recipes.map(r=>({r, m:matchRecipe(r)})).filter(x=>x.m && x.m.got>0).sort((a,b)=>b.m.ratio-a.m.ratio);
    const mh=el('<div style="margin-top:16px"><div class="dg-label">From your saved recipes</div></div>');
    if(!matches.length) mh.appendChild(el('<div class="empty" style="padding:4px 0">No saved recipes match yet. Add some recipes, or try the web suggestions below.</div>'));
    matches.slice(0,6).forEach(({r,m})=>{
      const item=el(`<div class="fridge-match">
        <div style="display:flex;justify-content:space-between;gap:10px"><strong style="font-weight:500">${esc(r.title||'Untitled')}</strong><span class="due" style="color:${m.ratio>=0.8?'var(--good)':'var(--ink-faint)'}">have ${m.got}/${m.total}</span></div>
        ${m.missing.length?`<div style="font-size:12px;color:var(--ink-soft);margin-top:3px">need: ${m.missing.map(esc).join(', ')}</div>`:'<div style="font-size:12px;color:var(--good);margin-top:3px">you have everything ✓</div>'}
      </div>`);
      item.onclick=()=>{ recipeOpen.add(r.id); renderView(); setTimeout(()=>{},0); };
      mh.appendChild(item);
    });
    inner.appendChild(mh);

    // web suggestions
    const sg=el('<div style="margin-top:18px"></div>');
    const btn=el(`<button class="addbtn">✨ Suggest new recipes from these</button>`);
    btn.onclick=suggestFromFridge;
    sg.appendChild(btn);
    if(fridgeSuggestLoading) sg.appendChild(el('<div class="empty" style="padding:8px 0">Thinking up recipes you could make…</div>'));
    else if(fridgeSuggestText) sg.appendChild(el(`<div class="fridge-suggest">${esc(fridgeSuggestText)}</div>`));
    inner.appendChild(sg);
  } else {
    inner.appendChild(el('<div class="empty" style="padding:8px 0 0">List what you have above, and I\u2019ll match it to your saved recipes and suggest new ones.</div>'));
  }
  return card;
}

  // filter chips (category tags + print statuses in use)
  const fl=wrap.querySelector('.rc-filter');
  const usedTags=RECIPE_TAGS.filter(t=>state.recipes.some(r=>(r.tags||[]).includes(t)));
  const usedPrints=PRINT_TAGS.filter(p=>state.recipes.some(r=>r.printStatus===p.k));
  if(usedTags.length||usedPrints.length){
    const mk=(label,val)=>{ const chip=el(`<button class="tagchip ${recipeFilter===val?'on':''}">${esc(label)}</button>`); chip.onclick=()=>{ recipeFilter=recipeFilter===val?null:val; renderView(); }; return chip; };
    fl.appendChild(mk('all',null));

    const ct=row.querySelector('.ctags');
    c.tags.forEach((tg,i)=>{
      const chip=el(`<span class="tag" style="font-size:9px">${esc(tg)} <span style="cursor:pointer">✕</span></span>`);
      chip.querySelector('span').onclick=()=>{c.tags.splice(i,1);save()};
      ct.appendChild(chip);
    });
    const ci=row.querySelector('.ctaginput');
    ci.onkeydown=e=>{ if(e.key==='Enter'&&ci.value.trim()){ c.tags.push(ci.value.trim());save(); } };
    row.querySelector('.x-del').onclick=()=>{state.captures=state.captures.filter(x=>x.id!==c.id);save()};
    body.appendChild(row);
  });
  return wrap;
}

/* ---------- search results ---------- */
function viewSearch(q){
  const term=q.toLowerCase();
  const hits=[];
  state.routines.forEach(r=>{if(r.name.toLowerCase().includes(term))hits.push(['Routine',r.name])});
  state.tasks.forEach(t=>{if(t.name.toLowerCase().includes(term))hits.push(['Task',t.name])});
  state.quests.forEach(qu=>{if(qu.name.toLowerCase().includes(term))hits.push(['Quest',qu.name]);qu.todos.forEach(t=>{if(t.text.toLowerCase().includes(term))hits.push(['Step',t.text])})});
  state.captures.forEach(c=>{
    const inTags=(c.tags||[]).some(tg=>tg.toLowerCase().includes(term));
    if(c.text.toLowerCase().includes(term)||inTags) hits.push(['Inbox',c.text+((c.tags&&c.tags.length)?'  ·  #'+c.tags.join(' #'):'')]);
  });
  [...state.library.reading,...state.library.watching,...(state.library.playing||[])].forEach(x=>{if(x.title.toLowerCase().includes(term))hits.push(['Library',x.title])});
  state.market.forEach(m=>{if(m.name.toLowerCase().includes(term))hits.push(['Reward',m.name])});
  const wrap=el(`<div><div class="page-head"><div class="eyebrow">Results for "${esc(q)}"</div><div class="page-title sm">Search</div></div><div class="body" style="max-width:600px"></div></div>`);
  const body=wrap.querySelector('.body');
  if(!hits.length) body.appendChild(el('<div class="empty">Nothing found.</div>'));
  hits.forEach(([k,v])=>body.appendChild(el(`<div class="row"><span class="tag" style="margin-top:2px">${k}</span><div class="row-body"><div class="row-title">${esc(v)}</div></div></div>`)));
  return wrap;
}

/* ============================================================
   MODALS
   ============================================================ */
function showModal(node){const o=$('#overlay');o.innerHTML='';o.appendChild(node);o.classList.add('show');o.onclick=e=>{if(e.target===o)closeModal()}}
function closeModal(){$('#overlay').classList.remove('show');$('#overlay').innerHTML=''}

function openCapture(){
  let type='thought';
  const known=[...new Set((state.captures||[]).flatMap(c=>c.tags||[]))];
  const selected=new Set();
  const m=el(`<div class="modal">
    <h3>Capture</h3>
    <div class="field"><label>Type</label><div class="seg">
      <button data-t="thought" class="on">Thought</button><button data-t="quote">Quote</button><button data-t="bookmark">Bookmark</button>
    </div></div>
    <div class="field"><label>What's on your mind</label><textarea id="capTxt" placeholder="Type it before it's gone…"></textarea></div>
    <div class="field"><label>Tags (optional)</label>
      ${known.length?'<div class="tagpick"></div>':''}
      <input id="capTags" placeholder="${known.length?'add a new tag…':'comma, separated — or skip'}">
    </div>
    <div class="modal-actions"><button class="btn ghost" id="capCancel">Cancel</button><button class="btn primary" id="capSave">Capture</button></div>
  </div>`);
  m.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{m.querySelectorAll('.seg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');type=b.dataset.t});
  // reusable tag chips
  const pick=m.querySelector('.tagpick');
  if(pick) known.forEach(tg=>{
    const chip=el(`<button class="tagchip">${esc(tg)}</button>`);
    chip.onclick=()=>{ if(selected.has(tg)){selected.delete(tg);chip.classList.remove('on');} else {selected.add(tg);chip.classList.add('on');} };
    pick.appendChild(chip);
  });
  m.querySelector('#capCancel').onclick=closeModal;
  const doSave=()=>{
    const v=m.querySelector('#capTxt').value.trim();
    if(!v){ m.querySelector('#capTxt').focus(); return; }
    const typed=m.querySelector('#capTags').value.split(',').map(s=>s.trim()).filter(Boolean);
    const tags=[...new Set([...selected, ...typed])];
    state.captures.push({id:uid(),text:v,type,tags,date:today()});
    closeModal(); save();
  };
  m.querySelector('#capSave').onclick=doSave;
  // Enter in the tag field saves; Cmd/Ctrl+Enter in the textarea saves
  m.querySelector('#capTags').onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); doSave(); } };
  m.querySelector('#capTxt').onkeydown=e=>{ if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){ e.preventDefault(); doSave(); } };
  showModal(m);
  setTimeout(()=>m.querySelector('#capTxt').focus(),50);
}

function addRoutineModal(){
  const m=el(`<div class="modal">
    <h3>New routine</h3>
    <div class="field"><label>Name</label><input id="rName" placeholder="e.g. Wash the curtains"></div>
    <div class="field"><label>How often</label><select id="rFreq">${Object.entries(FREQ).map(([k,v])=>`<option value="${k}">${v.label} · +${v.exp} EXP</option>`).join('')}</select></div>
    <div class="field" id="timeField"><label>Time of day</label><select id="rTime"><option value="morning">Morning</option><option value="afternoon">Afternoon</option><option value="evening">Evening</option></select></div>
    <div class="field"><label>Skill it builds <button type="button" class="skillq" onclick="openSkillGuide()">?</button></label><select id="rSkill">${SKILLS.map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div class="modal-actions"><button class="btn ghost" id="c">Cancel</button><button class="btn primary" id="s">Add</button></div>
  </div>`);
  const freqSel=m.querySelector('#rFreq');
  const timeField=m.querySelector('#timeField');
  freqSel.onchange=()=>{ timeField.style.display = freqSel.value==='daily' ? '' : 'none'; };
  m.querySelector('#c').onclick=closeModal;
  m.querySelector('#s').onclick=()=>{
    const n=m.querySelector('#rName').value.trim();if(!n)return;
    const freq=freqSel.value;
    state.routines.push({id:uid(),name:n,freq,time:m.querySelector('#rTime').value,skill:m.querySelector('#rSkill').value,streak:0,last:'',earnedOn:'',prevLast:''});
    closeModal();save();
  };
  showModal(m);setTimeout(()=>m.querySelector('#rName').focus(),50);

function addRewardModal(){
  const m=el(`<div class="modal">
    <h3>New reward</h3>
    <div class="field"><label>Reward</label><input id="mName" placeholder="e.g. Coffee shop afternoon"></div>
    <div class="field"><label>Price in coins</label><input id="mPrice" type="number" value="40"></div>
    <p class="hint">Rule of thumb: cheapest reward ≈ 1–2 good days, biggest ≈ 1–2 good weeks.</p>
    <div class="modal-actions"><button class="btn ghost" id="c">Cancel</button><button class="btn primary" id="s">Add</button></div>
  </div>`);
  m.querySelector('#c').onclick=closeModal;
  m.querySelector('#s').onclick=()=>{
    const n=m.querySelector('#mName').value.trim();const p=parseInt(m.querySelector('#mPrice').value)||10;
    if(!n)return;state.market.push({id:uid(),name:n,price:p});closeModal();save();
  };
  showModal(m);setTimeout(()=>m.querySelector('#mName').focus(),50);
}

const AVATARS=['🦊','🐺','🦉','🐉','🦌','🐈','🦅','🌿','🔥','🌙','⚔️','📖','🎯','🦁','🐢','✦'];
function openSettings(){
  const c=state.character;
  const m=el(`<div class="modal">
    <h3>Your character</h3>
    <div class="field"><label>Name</label><input id="sName" value="${esc(c.name)}"></div>
    <div class="field"><label>Avatar</label><div class="emoji-grid">${AVATARS.map(a=>`<button data-a="${a}" class="${a===c.avatar?'on':''}">${a}</button>`).join('')}</div></div>
    <div class="field"><label>Backup & move between devices</label>
      <div style="display:flex;gap:8px">
        <button class="btn" id="export" style="flex:1">⬇ Export backup</button>
        <button class="btn" id="import" style="flex:1">⬆ Import backup</button>
      </div>
      <p class="hint" style="margin-top:6px">Export saves a file with everything. Import it on another device to move your data over.</p>
    </div>
    ${CLOUD?'<div class="field"><button class="btn" id="signout" style="width:100%">Sign out</button><p class="hint" style="margin-top:6px">Synced to your account across devices.</p></div>':''}
    <div class="modal-actions" style="justify-content:space-between">
      <button class="btn danger" id="reset">Reset all data</button>
      <span><button class="btn ghost" id="c">Cancel</button><button class="btn primary" id="s">Save</button></span>
    </div>
  </div>`);
  let chosen=c.avatar;
  m.querySelectorAll('.emoji-grid button').forEach(b=>b.onclick=()=>{m.querySelectorAll('.emoji-grid button').forEach(x=>x.classList.remove('on'));b.classList.add('on');chosen=b.dataset.a});
  m.querySelector('#export').onclick=exportData;
  m.querySelector('#import').onclick=importData;
  if(m.querySelector('#signout')) m.querySelector('#signout').onclick=signOut;
  m.querySelector('#c').onclick=closeModal;
  m.querySelector('#s').onclick=()=>{c.name=m.querySelector('#sName').value.trim()||c.name;c.avatar=chosen;closeModal();save()};
  m.querySelector('#reset').onclick=async()=>{
    if(confirm('Erase everything and start fresh? This cannot be undone.')){
      state=defaultState();await persist();closeModal();renderAll();
    }
  };
  showModal(m);
}

/* ============================================================
   RENDER + SAVE
   ============================================================ */
const VIEWS={today:viewToday,tasks:viewTasks,routines:viewRoutines,quests:viewQuests,fights:viewFights,library:viewLibrary,digest:viewDigest,design:viewDesign,recipes:viewRecipes,skills:viewSkills,stats:viewStats,market:viewMarket,capture:viewCapture};
function renderView(){
  const v=$('#view');v.innerHTML='';
  const sq=$('#searchInput').value.trim();
  if(activeTab==='__search' && sq){ v.appendChild(viewSearch(sq)); return; }
  v.appendChild((VIEWS[activeTab]||viewToday)());
}
function renderAll(){ renderNav(); renderChar(); renderView(); }
async function save(){ await persist(); renderChar(); renderView(); }

/* search */
function initSearch(){
  const inp=$('#searchInput');
  inp.oninput=()=>{
    if(inp.value.trim()){ activeTab='__search'; }
    else { activeTab='today'; }
    renderNav(); renderView();
  };
}

/* ============================================================
   BOOT
   ============================================================ */
function migrateState(){
  // migrate older saves / fill any missing shape
  if(!state.appName) state.appName='Foxglove';
  if(!state.tasks) state.tasks=[];
  // convert legacy Top 3 slots into real starred tasks
  if(state.top3){
    state.top3.forEach(s=>{ if(s && s.text && s.text.trim()) state.tasks.push({id:uid(),name:s.text.trim(),skill:'Compass',done:!!s.done,top:true}); });
    delete state.top3;
  }
  state.tasks.forEach(t=>{ if(t.top===undefined) t.top=false; if(!t.skill) t.skill='Compass'; if(t.earned===undefined) t.earned=!!t.done; if(!t.priority) t.priority='medium'; });
  if(!state.library) state.library={reading:[],watching:[],playing:[]};
  if(!state.library.playing) state.library.playing=[];
  ['reading','watching','playing'].forEach(k=>{
    (state.library[k]||[]).forEach(x=>{
      if(!x.status) x.status = (x.current===false ? 'done' : 'current');
      if(x.finishedOn===undefined) x.finishedOn = x.status==='done' ? today() : null;
    });
  });
  if(!state.captures) state.captures=[];
  state.captures.forEach(c=>{ if(!c.tags) c.tags=[]; });
  if(!state.quests) state.quests=[];
  state.quests.forEach(q=>{
    if(q.earnedComplete===undefined) q.earnedComplete = q.todos.length>0 && q.todos.every(x=>x.done);
    if(q.lastTouched===undefined) q.lastTouched=today();
    q.todos.forEach(t=>{ if(!t.skill) t.skill='Compass'; if(t.earned===undefined) t.earned=!!t.done; });
  });
  if(!state.routines) state.routines=[];
  state.routines.forEach(r=>{ if(r.earnedOn===undefined) r.earnedOn = (r.last===today()? today() : ''); if(!r.freq) r.freq='daily'; if(r.prevLast===undefined) r.prevLast=''; });
  if(!state.log) state.log=[];
  if(!state.character) state.character={name:'Mira',avatar:'🦊',level:1,exp:0,coins:20,hp:100,maxHp:100};
  if(state.character.hp==null) state.character.hp=100;
  if(state.character.maxHp==null) state.character.maxHp=100;
  if(!state.bosses) state.bosses=[];
  state.bosses.forEach(b=>{ if(b.acted===undefined) b.acted=''; if(b.actedType===undefined) b.actedType=''; if(b.earnedOn===undefined) b.earnedOn=''; if(b.defeated===undefined) b.defeated=false; if(b.defeatedOn===undefined) b.defeatedOn=null; if(!b.emoji) b.emoji='👾'; if(!b.skill) b.skill='Spiritual'; if(b.slipStreak===undefined) b.slipStreak=0; if(b.lastSlipDay===undefined) b.lastSlipDay=''; });
  if(!state.digests) state.digests={personal:[],design:[]};
  if(!state.digests.personal) state.digests.personal=[];
  if(!state.digests.design) state.digests.design=[];
  state.digests.personal.concat(state.digests.design).forEach(e=>{ if(!e.images) e.images=[]; });
  if(!state.recipes) state.recipes=[];
  state.recipes.forEach(r=>{ if(r.printStatus===undefined) r.printStatus=''; if(!r.tags) r.tags=[]; delete r._loading; });
  if(state.fridge===undefined) state.fridge='';
  // rename skills (Physical→Health, Intellect→Mind, Spiritual→Soul, Core→Compass) and add Fortitude
  const remappedSkills={}; SKILLS.forEach(s=>remappedSkills[s]={level:1,exp:0});
  Object.entries(state.skills||{}).forEach(([k,v])=>{ const nk=renSkill(k); if(remappedSkills[nk]) remappedSkills[nk]=v; });
  state.skills=remappedSkills;
  state.tasks.forEach(t=>t.skill=renSkill(t.skill));
  state.routines.forEach(r=>r.skill=renSkill(r.skill));
  state.quests.forEach(q=>q.todos.forEach(t=>t.skill=renSkill(t.skill)));
  state.bosses.forEach(b=>b.skill=renSkill(b.skill));
  (state.log||[]).forEach(e=>{ if(e.skill) e.skill=renSkill(e.skill); });
  // skill rubric notes
  if(!state.skillNotes) state.skillNotes=defaultSkillNotes();
  else { const dn=defaultSkillNotes(); Object.keys(state.skillNotes).forEach(k=>{ const nk=renSkill(k); if(nk!==k){ state.skillNotes[nk]=state.skillNotes[k]; delete state.skillNotes[k]; } }); SKILLS.forEach(s=>{ if(!state.skillNotes[s]) state.skillNotes[s]=dn[s]||[]; }); }
  // ensure skill shape
  SKILLS.forEach(s=>{ if(!state.skills[s]) state.skills[s]={level:1,exp:0}; });
}

/* ---------- backup / restore (manual cross-device sync) ---------- */
function exportData(){
  try{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=(state.appName||'foxglove').toLowerCase()+'-backup-'+today()+'.json'; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast('Backup downloaded');
  }catch(e){ toast('Could not export'); }
}
function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
  inp.onchange=()=>{
    const f=inp.files&&inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const obj=JSON.parse(r.result);
        if(!obj || typeof obj!=='object' || !obj.character) throw 0;
        state=obj; migrateState(); persist(); closeModal(); renderAll(); toast('Backup restored');
      }catch(e){ toast('That file couldn’t be read as a backup'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

/* ============================================================
   BOOT
   ============================================================ */
async function startApp(){
  const loaded=await loadState();
  state = loaded || defaultState();
  migrateState();
  dailyReset();
  await persist();
  const brand=$('#brandName');
  brand.textContent=state.appName;
  document.title=state.appName;
  brand.onblur=()=>{ state.appName=brand.textContent.trim()||'Foxglove'; brand.textContent=state.appName; document.title=state.appName; persist(); };
  brand.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();brand.blur();} };
  $('#todayDate').textContent=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toUpperCase();
  initSearch();
  renderAll();
}
function showLogin(){
  const scr=$('#authScreen'); scr.classList.add('show');
  const email=$('#authEmail'), pass=$('#authPass'), msg=$('#authMsg');
  const finish=async()=>{ scr.classList.remove('show'); await startApp(); };
  $('#authSignin').onclick=async()=>{
    msg.textContent='';
    const {data,error}=await sb.auth.signInWithPassword({email:email.value.trim(),password:pass.value});
    if(error){ msg.textContent=error.message; return; }
    cloudUser=data.user; finish();
  };
  $('#authSignup').onclick=async()=>{
    msg.textContent='';
    const {data,error}=await sb.auth.signUp({email:email.value.trim(),password:pass.value});
    if(error){ msg.textContent=error.message; return; }
    if(data.session){ cloudUser=data.user; finish(); }
    else { msg.style.color='var(--good)'; msg.textContent='Account made — check your email to confirm, then sign in.'; }
  };
  pass.onkeydown=e=>{ if(e.key==='Enter') $('#authSignin').click(); };
}
async function signOut(){
  if(CLOUD && sb){ try{ await sb.auth.signOut(); }catch(e){} }
  try{ localStorage.removeItem(KEY); }catch(e){}
  location.reload();
}
(async function init(){
  if(CLOUD){
    try{
      const {data:{session}}=await sb.auth.getSession();
      if(!session){ showLogin(); return; }
      cloudUser=session.user;
    }catch(e){ showLogin(); return; }
  }
  startApp();
})();
</script>
